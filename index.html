    <footer>
        <h2>v0.2.0 - JazhdoMC</h2>
        <script type="module">
import { marked } from 'https://cdn.jsdelivr.net/npm/marked/lib/marked.esm.js';
const header = document.getElementsByTagName('header')[0];
const main = document.getElementById('main');
const nav = document.createElement('nav');
const links = ["home", "staff", "rules", "moderator", "changelog", "sources"];
function capitalizeFirstLetter(str) {
    return str.charAt(0).toUpperCase() + str.slice(1);
}
for (let i = 0; i < links.length; i++) {
    const link = document.createElement('a');
    link.textContent = capitalizeFirstLetter(links[i]);
    link.addEventListener('click', () => open(links[i], ((0b110000 >> (links.length - 1 - i)) & 1) ? 'html' : 'md'));
    nav.append(link);
}
header.append(nav);
async function open(page, type) {
    let res = await fetch('./' + page + '.' + type);
    res = await res.text();
    if (type == 'md') res = marked.parse('# ' + capitalizeFirstLetter(page) + '\n' + res);
    main.innerHTML = res;
}
const searchParams = new URLSearchParams(window.location.search);
if (searchParams.has("page")) {
    const parts = searchParams.get("page").split('.');
    console.log(parts)
    open(parts[0], parts[1]);
} else open('home', 1);
        </script>
    </footer>
