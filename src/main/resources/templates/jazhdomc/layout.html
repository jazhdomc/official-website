    <style>
/* Root Elements */
:root {
    color-scheme: light dark;

    /* Colors */
    --blue-selected: light-dark(#66d4fe, #11c);
    --blue-selected-light: light-dark(#55c3ed, #00b);
    --blue-theme: light-dark(#00b7ef, #009);
    --text-color: light-dark(#111, #eee);
    --popup: light-dark(#cbcdcd, #444);
    --popup-2: light-dark(#dbdddd, #333);
}
html {
    width: 100%;
    height: 100%;
    display: flex;
}
body {
    margin: 0px;
    display: flex;
    flex-direction: column;
    width: 100%;
    color: var(--text-color);
    font-family: sans-serif;
    overflow-x: hidden;
}

/* Header */
header {
    display: flex;
    position: sticky;
    top: 0px;
    justify-content: space-between;
    background-color: var(--blue-theme);
    padding: 5px;
}
header a {
    user-select: none;
    -ms-user-select: none;
    -moz-user-select: none;
    -webkit-user-select: none;
    font-size: clamp(25px, 1vw, 35px);
    text-decoration: none;
    border-radius: 100vw;
    color: var(--text-color);
    padding: clamp(12.5px, 0.5vw, 17.5px) clamp(20px, 1vw, 30px);
    transition: ease 0.3s;
}
header a.active {
    background-color: var(--blue-selected);
}
header a:hover {
    background-color: var(--blue-selected-light);
    cursor: pointer;
}
header a#toptitle {
    font-weight: 700;
}
header nav {
    display: flex;
    flex-direction: row;
    text-align: right;
}
header #pancake-menu, #mobile-cancel {
    display: none;
}
@media (max-width: 1127px) {
    header nav {
        display: none;
        border-radius: 50px;
        border-top-right-radius: 0px;
        background-color: var(--popup);
        flex-direction: column;
        text-align: center;
        position: fixed;
        top: 0px;
        right: 0px;
        height: fit-content;
        gap: 10px;
        width: 180px;
        padding: 20px;
        z-index: 100;
    }
    header nav a {
        background-color: var(--popup-2);
        border-radius: 1000px;
        padding: 20px;
    }
    #mobile-cancel {
        display: inline;
        position: fixed;
        top: 0px;
        bottom: 0px;
        left: 0px;
        right: 0px;
        z-index: 90;
    }
    header #pancake-menu {
        display: flex;
        flex-direction: column;
        justify-content: space-around;
        align-items: center;
        width: 45px;
        height: 50.5px;
        padding: 0px 4.15px;
        border-radius: 10px;
    }
    header #pancake-menu:hover {
        background-color: var(--blue-selected-light);
    }
    header #pancake-menu hr {
        width: 45px;
        height: 8.5px;
        background-color: grey;
        border-radius: 10px;
        border: none;
        margin: 0px;
    }
}

/* Main */
div#main {
    margin: clamp(15px, 2vw, 50px);
    flex: 1;
    overflow-wrap: break-word;
    width: calc(100vw - margin);
}

/* Footer */
footer {
    background-color: var(--blue-theme);
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    place-items: center;
}
footer h2 {
    margin: 10px 20px;
    font-weight: 500;
}
footer h2 a {
    user-select: none;
    -ms-user-select: none;
    -moz-user-select: none;
    -webkit-user-select: none;
    color: var(--text-color);
    text-decoration: none;
}
    </style>
</head>
<body>
    <header>
        <a href="/" id="toptitle">JazhdoMC</a>
        <nav>
            <a th:each="page : ${navPages}" th:href="@{${'/' + page.folder + page.name}}" th:text="${page.display}" th:classappend="${page == currentPage} ? 'active' : ''"></a>
            <a id="dashboardBtn" href="/dashboard" th:classappend="${'dashboard' == currentPage.name} ? 'active' : ''">Dashboard</a>
        </nav>
        <div id="pancake-menu">
            <hr>
            <hr>
            <hr>
        </div>
    </header>
    <script type="importmap">
    {
        "imports": {
            "@firebase/app": "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js",
            "@firebase/auth": "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js",
            "@firebase/firestore": "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js",
            "@firebase/app-check": "https://www.gstatic.com/firebasejs/12.0.0/firebase-app-check.js"
        }
    }
    </script>
    <div id="main" th:utext="${content}"></div>
    <script type="module" src="/js/utils"></script>
    <footer>
        <h2>v1.0.0 - JazhdoMC</h2>
        <h2>
            <a href="/privacy">Privacy Policy</a>
        </h2>
        <h2>
            <a href="/terms">Terms of Service</a>
        </h2>
        <h2>
            <a href="/help#bugs">Bug? Report it here.</a>
        </h2>
    </footer>
</body>
</html>
