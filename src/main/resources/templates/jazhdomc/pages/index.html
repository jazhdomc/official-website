    <link rel="stylesheet" href="/style.css">
    <style>
/* Root Elements */
:root {
    color-scheme: light dark;

    /* Colors */
    --blue-selected: light-dark(#0be, #11c);
    --blue-theme: light-dark(#00b7ef, #009);
    --text-color: light-dark(#111, #eee);
}
html {
    width: 100%;
    height: 100%;
}
body {
    margin: 0px;
    display: flex;
    flex-direction: column;
    height: 100%;
    width: 100%;
    color: var(--text-color);
}

/* Header */
header {
    display: flex;
    justify-content: space-between;
    background-color: var(--blue-theme);
    padding: 5px;
}
header a {
    font-size: clamp(25px, 1vw, 35px);
    text-decoration: none;
    border-radius: 100vw;
    color: var(--text-color);
    padding: clamp(12.5px, 0.5vw, 17.5px) clamp(20px, 1vw, 30px);
}
header a:hover {
    cursor: pointer;
    background-color: var(--blue-selected);
}
header a#toptitle {
    font-weight: 700;
}
header nav {
    display: flex;
}

/* Main */
div#main {
    margin: clamp(10px, 2vw, 50px);
    flex: 1;
}

/* Footer */
footer {
    background-color: var(--blue-theme);
    display: flex;
    justify-content: center;
}

/* At 440px and greater, use buttons, else, use pancake menu */
    </style>
</head>
<body>
    <header>
        <a href="/" id="toptitle">JazhdoMC</a>
    </header>
    <div id="main">
        <noscript>
            <h1>Javascript is required to view the version of this site on jazhdomc.github.io. Go to <a href="https://mc.itsjaz.com">mc.itsjaz.com</a> to view the site without javascript.</h1>
        </noscript>
    </div>
    <footer>
        <h2>v0.2.1 - JazhdoMC</h2>
        <script type="module">
import { marked } from "https://cdn.jsdelivr.net/npm/marked/lib/marked.esm.js";

// ---------- CONFIGURATION OPTIONS START ----------

// Routes
const links = ["home", "staff", "rules", "moderator", "changelog", "sources"];

// File types (1 is html and 2 is markdown)
const fileTypes = 0b110000;

// ----------- CONFIGURATION OPTIONS END -----------

/**
 * Capitalizes the first letter of the given string
 * 
 * @param {String} str 
 * @returns String with the first letter capitalized
 */
function capitalizeFirstLetter(str) {
    return str.charAt(0).toUpperCase() + str.slice(1);
}

// Create website navigation links
const header = document.getElementsByTagName("header")[0];
const nav = document.createElement("nav");
for (let i = 0; i < links.length; i++) {
    const link = document.createElement("a");
    link.textContent = capitalizeFirstLetter(links[i]);
    link.addEventListener("click", () => open(links[i], ((fileTypes >> (links.length - 1 - i)) & 1) ? "html" : "md"));
    nav.append(link);
}
header.append(nav);

/**
 * Opens the specified page like a redirect
 * 
 * @param {String} page 
 * @param {String} type 
 */
async function open(page, type) {
    let res = await fetch("./" + page + "." + type);
    res = await res.text();
    if (type == "md") res = marked.parse("# " + capitalizeFirstLetter(page) + "\n" + res);
    document.getElementById("main").innerHTML = res;
}

// Open a link to the right page if search param given
const searchParams = new URLSearchParams(window.location.search);
if (searchParams.has("page")) {
    const parts = searchParams.get("page").split(".");
    console.log(parts)
    open(parts[0], parts[1]);
} else open("home", "html");
        </script>
    </footer>
