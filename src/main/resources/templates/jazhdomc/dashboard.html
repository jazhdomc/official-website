<script>window.addEventListener("load", () => window.checkCookies())</script>
<style>
    /* Common colors */
    :root {
        --unselected-gray: light-dark(#d3d3d3, #0f0f0f);
        --selected-gray: light-dark(#c3c3c3, #1f1f1f);
    }

    /* Grid */
    #grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, 180px);
        grid-template-rows: repeat(auto-fill, 180px);
        gap: 80px;
        justify-content: space-between;
        place-items: center;
        margin: 80px;
    }
    #grid div {
        user-select: none;
        -ms-user-select: none;
        -moz-user-select: none;
        -webkit-user-select: none;
        background-color: var(--unselected-gray);
        border-radius: 35px;
        width: 200px;
        height: 200px;
        display: flex;
        flex-direction: column;
        justify-content: space-evenly;
        align-items: center;
        text-align: center;
        transition: 0.17s ease-in;
        border: 1px solid #808080;
    }
    #grid div:hover {
        cursor: pointer;
        background-color: var(--selected-gray);
    }
    #grid div h2 {
        margin: 0px;
    }
    #grid div p {
        margin: 0px 10px;
        text-wrap: pretty;
    }

    /* Popup */
    #popup {
        background-color: light-dark(white, black);
        border: 3px solid #808080;
        border-radius: 40px;
        width: clamp(100px, 80vw, 1000px);
        height: 90vh;
        padding: 20px;
        overflow-y: scroll;
    }

    /* Popup background */
    #background {
        position: fixed;
        left: 0px;
        top: 0px;
        right: 0px;
        bottom: 0px;
        background-color: #ffffffa0;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* Role changes UI */
    #roles-box {
        display: flex;
        flex-direction: column;
    }
    #roles-box div {
        display: flex;
        flex-direction: row;
        padding: 5px;
    }

    /* Minus icon button */
    button.minus-icon {
        width: 25px;
        height: 25px;
        border-radius: 25px;
        background-color: red;
        display: flex;
        justify-content: center;
        align-items: center;
        border: 1px solid #000;
        padding: 0px;
    }
    button.minus-icon:hover {
        cursor: pointer;
        background-color: #c80000;
    }
    button.minus-icon hr {
        background-color: white;
        height: 4px;
        width: 15px;
        border: none;
        border-radius: 4px;
    }

    /* Username changes UI */
    #minecraft-usernames, #discord-usernames {
        display: flex;
        flex-direction: column;
    }
    #minecraft-usernames div, #discord-usernames div {
        display: flex;
        flex-direction: row;
        padding: 5px;
    }
</style>
<h1 id="title">Player Dashboard</h1>
<div id="grid"></div>
<script type="module" src="/js/dashboard"></script>
