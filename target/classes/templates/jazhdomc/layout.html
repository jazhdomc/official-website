    <style>
/* Root Elements */
:root {
    color-scheme: light dark;

    /* Colors */
    --blue-selected: light-dark(#0be, #11c);
    --blue-theme: light-dark(#00b7ef, #009);
    --text-color: light-dark(#111, #eee);
}
html {
    width: 100%;
    height: 100%;
}
body {
    margin: 0px;
    display: flex;
    flex-direction: column;
    height: 100%;
    width: 100%;
    color: var(--text-color);
}

/* Header */
header {
    display: flex;
    justify-content: space-between;
    background-color: var(--blue-theme);
    padding: 5px;
}
header a {
    font-size: clamp(25px, 1vw, 35px);
    text-decoration: none;
    border-radius: 100vw;
    color: var(--text-color);
    padding: clamp(12.5px, 0.5vw, 17.5px) clamp(20px, 1vw, 30px);
}
header a:hover {
    cursor: pointer;
    background-color: var(--blue-selected);
}
header a#toptitle {
    font-weight: 700;
}
header nav {
    display: flex;
}

/* Main */
div#main {
    margin: clamp(10px, 2vw, 50px);
    flex: 1;
}

/* Footer */
footer {
    background-color: var(--blue-theme);
    display: flex;
    justify-content: center;
}

/* At 440px and greater, use buttons, else, use pancake menu */
    </style>
</head>
<body>
    <header>
        <a href="/" id="toptitle">JazhdoMC</a>
        <nav>
            <a th:each="link : ${navLinks}" th:href="@{/{page}(page=${link})}" th:text="${#strings.capitalize(link)}" th:classappend="${link == currentPage} ? 'active' : ''"></a>
        </nav>
    </header>
    <div id="main" th:utext="${content}"></div>
    <footer>
        <h2>v0.2.1 - JazhdoMC</h2>
    </footer>
</body>
</html>
